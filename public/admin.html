<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Ordinex</title>
  <link rel="stylesheet" href="/stye.css">
  <style>
    body {
      background: #fff;
    }

    #adminTitle {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      margin: 32px 0 20px;
      letter-spacing: -0.2px;
    }

    .zahtjev-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }

    .zahtjev-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .zahtjev-ime {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .zahtjev-datum {
      font-size: 12px;
      color: var(--muted);
    }

    .zahtjev-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      font-size: 13.5px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .zahtjev-row:last-of-type {
      border-bottom: none;
    }

    .zahtjev-label {
      color: var(--muted);
      font-weight: 500;
    }

    .zahtjev-value {
      color: var(--text);
    }

    .zahtjev-akcije {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn-potvrdi {
      flex: 1;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .btn-potvrdi:hover { background: var(--accent-2); }

    .btn-predlozi {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .btn-predlozi:hover {
      background: var(--accent-soft);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .status-potvrdjeno {
      background: #dcfce7;
      color: #166534;
    }

    .status-predlozeno {
      background: #fef9c3;
      color: #854d0e;
    }

    .prazno {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 48px;
    }

    /* ── Kalendar ── */
    .kal-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    .kal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .kal-nav-btn {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .kal-nav-btn:hover { background: var(--accent); color: #fff; }

    .kal-mjes {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .kal-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
    }

    .kal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .kal-header-dan {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kal-dan {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: background 0.12s;
      border: 1px solid transparent;
      color: var(--text);
      user-select: none;
      min-height: 36px;
    }
    .kal-dan:hover:not(.kal-prazan) { background: rgba(0,0,0,0.06); }
    .kal-dan.kal-odabran { background: var(--accent) !important; color: #fff !important; }
    .kal-dan.kal-danas   { border-color: var(--accent); }
    .kal-dan.kal-prazan  { cursor: default; }

    .kal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      bottom: 3px;
    }
    .kal-odabran .kal-dot { background: #fff; }

    /* Termini */
    .termini-wrap {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
    }

    .termini-naslov {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .termini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .termin-slot {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .termin-slot.zauzet {
      opacity: 0.42;
      text-decoration: line-through;
      color: var(--muted);
      background: #f5f5f5;
    }

    .termin-info {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      display: block;
      margin-top: 3px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

  <h2 id="adminTitle">Admin</h2>
  <div id="zahtjevi" style="max-width:760px; margin:0 auto; padding:0 16px 48px;"></div>

  <script src="/admin.js"></script>
</body>
</html>
