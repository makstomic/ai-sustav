<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Ordinova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { visibility: hidden; }</style>
  <style>
    /* ========================
       Varijable
       ======================== */
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0d9488;
      --accent-2: #0f766e;
      --accent-soft: rgba(13, 148, 136, 0.10);
      --border: rgba(15, 23, 42, 0.10);
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.05), 0 8px 24px rgba(15, 23, 42, 0.07);
      --font: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========================
       Sidebar
       ======================== */
    #sidebar {
      width: 220px;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 20;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Logo + naziv ordinacije */
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .sidebar-logo-text {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .sidebar-logo-text span { color: var(--accent); }

    .sidebar-brand {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.38);
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Navigacijske sekcije */
    .sidebar-nav {
      flex: 1;
      padding: 10px 0;
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      padding: 14px 20px 5px;
    }

    /* Nav item */
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px 10px 17px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.48);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      border-left: 3px solid transparent;
      user-select: none;
    }

    .sidebar-item:hover {
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.05);
    }

    .sidebar-item.active {
      color: #fff;
      background: rgba(13, 148, 136, 0.16);
      border-left-color: var(--accent);
    }

    .sidebar-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .sidebar-item.active svg { opacity: 1; }

    /* Badge broj na nav itemu */
    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 999px;
      min-width: 18px;
      text-align: center;
    }

    /* ========================
       Topbar (hamburger + naslov)
       ======================== */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
    }

    /* Hamburger gumb — vidljiv samo na mobitelu */
    #menuToggle {
      display: none;
      flex-direction: column;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    #menuToggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.2s;
    }

    #adminTitle {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-ordinacija {
      font-size: 12px;
      color: var(--muted);
      display: none;
    }

    /* ========================
       Glavni sadržaj
       ======================== */
    #main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #content {
      padding: 28px 24px;
      flex: 1;
    }

    /* ========================
       Zahtjev kartice — identičan dizajn kao prije, samo u novom layoutu
       ======================== */
    #zahtjevi {
      max-width: 760px;
    }

    .zahtjev-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }

    .zahtjev-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .zahtjev-ime {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .zahtjev-datum {
      font-size: 12px;
      color: var(--muted);
    }

    .zahtjev-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      font-size: 13.5px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .zahtjev-row:last-of-type { border-bottom: none; }

    .zahtjev-label { color: var(--muted); font-weight: 500; }
    .zahtjev-value { color: var(--text); }

    .zahtjev-akcije {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn-potvrdi {
      flex: 1;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }

    .btn-potvrdi:hover { background: var(--accent-2); }

    .btn-predlozi {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .btn-predlozi:hover { background: var(--accent-soft); }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .status-potvrdjeno { background: #dcfce7; color: #166534; }
    .status-predlozeno { background: #fef9c3; color: #854d0e; }
    .status-otkazano   { background: #fee2e2; color: #991b1b; }

    .btn-otkazi {
      padding: 10px;
      background: transparent;
      color: #dc2626;
      border: 1.5px solid #dc2626;
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .btn-otkazi:hover { background: #fee2e2; }

    /* Doctor switcher */
    .doctor-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 16px;
      max-width: 760px;
    }

    .doctor-switcher-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .doctor-switcher-name {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .doctor-arrow {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 15px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .doctor-arrow:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .prazno {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 48px;
    }

    /* ========================
       Kalendar — side-by-side layout
       ======================== */
    .kal-wrap {
      max-width: 960px;
    }

    /* Lijevo kalendar, desno termini */
    .kal-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 680px) {
      .kal-layout { grid-template-columns: 1fr; }
    }


    /* Placeholder kad nije odabran dan */
    .kal-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      min-height: 200px;
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 32px;
    }

    .kal-placeholder svg { color: rgba(100,116,139,0.3); }

    .kal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .kal-nav-btn {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .kal-nav-btn:hover { background: var(--accent); color: #fff; }

    .kal-mjes {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .kal-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
    }

    .kal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .kal-header-dan {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kal-dan {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: background 0.12s;
      border: 1px solid transparent;
      color: var(--text);
      user-select: none;
      min-height: 36px;
    }

    .kal-dan:hover:not(.kal-prazan) { background: rgba(0, 0, 0, 0.05); }
    .kal-dan.kal-odabran { background: var(--accent) !important; color: #fff !important; }
    .kal-dan.kal-danas   { border-color: var(--accent); }
    .kal-dan.kal-prazan  { cursor: default; }

    .kal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      bottom: 3px;
    }

    .kal-odabran .kal-dot { background: #fff; }

    .termini-wrap {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
    }

    .termini-naslov {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .termini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .termin-slot {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .termin-slot.zauzet {
      opacity: 0.42;
      text-decoration: line-through;
      color: var(--muted);
      background: #f5f5f5;
    }

    .termin-info {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      display: block;
      margin-top: 3px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ========================
       Overlay (mobilni meni)
       ======================== */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 15;
    }

    #overlay.aktivan { display: block; }

    /* ========================
       Responsivnost
       ======================== */
    @media (max-width: 768px) {
      #sidebar {
        transform: translateX(-100%);
      }

      #sidebar.otvoren {
        transform: translateX(0);
      }

      #main {
        margin-left: 0;
      }

      #menuToggle {
        display: flex;
      }

      .topbar-ordinacija {
        display: block;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    /* ========================
       Mobile optimizacija (≤ 768px)
       ======================== */
    @media (max-width: 768px) {
      #content {
        padding: 16px 14px;
      }

      /* Zahtjev kartice — kompaktnije */
      .zahtjev-card {
        padding: 14px 16px;
        margin-bottom: 10px;
      }

      .zahtjev-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        margin-bottom: 10px;
        padding-bottom: 10px;
      }

      /* Podaci u redovima — puni width na mobitelu */
      .zahtjev-row {
        grid-template-columns: 90px 1fr;
        font-size: 13px;
        padding: 6px 0;
      }

      /* Gumbi za akcije — stapaju se na malom ekranu */
      .zahtjev-akcije {
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
      }

      .btn-potvrdi,
      .btn-predlozi {
        padding: 13px;
        font-size: 14px;
      }

      /* Kalendar layout — već stacked, samo razmaci */
      .kal-wrap {
        max-width: 100%;
      }

      .kal-card {
        padding: 12px;
      }

      .kal-dan {
        min-height: 40px;
        font-size: 13px;
      }

      /* Termini grid — manji minimum da stanu na ekran */
      .termini-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 6px;
      }

      .termini-wrap {
        padding: 14px 16px;
      }

      /* Topbar — malo manji */
      #topbar {
        height: 52px;
        padding: 0 16px;
      }

      #adminTitle {
        font-size: 14px;
      }
    }

    /* Extra mali ekrani (≤ 400px) */
    @media (max-width: 400px) {
      .zahtjev-row {
        grid-template-columns: 80px 1fr;
        font-size: 12px;
      }

      .kal-header-dan {
        font-size: 9px;
        padding: 4px 0;
      }

      .termini-grid {
        grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      }
    }
  </style>
</head>
<body>

  <!-- Overlay za zatvaranje mobilnog menija -->
  <div id="overlay" onclick="zatvoriMeni()"></div>

  <!-- ========================
       Sidebar
       ======================== -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Ordin<span>ova</span></div>
      <div class="sidebar-brand" id="sidebarBrand">Admin panel</div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Zahtjevi</div>

      <div class="sidebar-item active" id="nav-cekanje" onclick="promijeniTab('cekanje')">
        <!-- Ikona: inbox -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
          <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
        </svg>
        Na čekanju
        <span class="nav-badge" id="nav-pending-badge" style="display:none;"></span>
      </div>

      <div class="sidebar-item" id="nav-povijest" onclick="promijeniTab('povijest')">
        <!-- Ikona: povijest -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Povijest
      </div>

      <div class="sidebar-section-label">Raspored</div>

      <div class="sidebar-item" id="nav-kalendar" onclick="promijeniTab('kalendar')">
        <!-- Ikona: kalendar -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Kalendar
      </div>
    </nav>
  </aside>

  <!-- ========================
       Glavni sadržaj
       ======================== -->
  <div id="main">

    <!-- Topbar -->
    <div id="topbar">
      <button id="menuToggle" onclick="toggleMeni()" aria-label="Otvori meni">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h2 id="adminTitle">Admin</h2>
      <div class="topbar-right">
        <span class="topbar-ordinacija" id="topbarOrdinacija"></span>
      </div>
    </div>

    <!-- Content -->
    <div id="content">
      <div id="zahtjevi"></div>
    </div>

  </div>

  <script>
    // Mobilni meni toggle
    function toggleMeni() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      sidebar.classList.toggle("otvoren");
      overlay.classList.toggle("aktivan");
    }

    function zatvoriMeni() {
      document.getElementById("sidebar").classList.remove("otvoren");
      document.getElementById("overlay").classList.remove("aktivan");
    }

    // Zatvori meni pri kliku na nav item na mobitelu
    document.querySelectorAll(".sidebar-item").forEach(item => {
      item.addEventListener("click", () => {
        if (window.innerWidth <= 768) zatvoriMeni();
      });
    });
  </script>

  <script src="/admin.js"></script>
</body>
</html>
